name: Publish UI Package

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Storybook Test
        run: npm run test-storybook

      - name: Build Package
        run: npm run build:package

      - name: Consumer Smoke Build
        run: npm run build:smoke-consumer

      - name: Validate Style Literals
        run: npm run check:style-literals

      - name: Validate Doc Coverage
        run: npm run check:doc-coverage

      - name: Build Storybook
        run: npm run build:storybook

      - name: Visual Regression
        run: npm run test:visual

      - name: Validate Bundle Size
        run: node scripts/check-bundle-size.mjs

      - name: Validate Exports
        run: node scripts/check-exports.mjs

      - name: Pack Tarball
        run: npm pack

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ingradient-ui-*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
